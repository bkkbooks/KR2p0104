body:
  text: 武威漢簡甲本少牢釋文甲本少牢釋文少牢餽食之禮日用丁己筮旬有一日筮于廟門之外主人朝服西面于門東史朝服左執筮右䌛上犢兼與筮執之東面受命于主人主人曰孝孫某來丁亥用薦歲事于皇祖伯某以其𦘺𦘺某是尚薌史曰若西面于門西䌛下犢左執筮右兼執犢以擊筮遂術曰徦女大筮有常孝孫某來丁亥用薦歲事于皇祖伯某以其𦘺𦘺某是尚薌乃舍犢立筮刲者在左坐刲以木卒筮乃書卦于木示主人乃退占吉則史犢筮史兼執筮與卦以告于主人占曰從乃官戒宗人命濯宰命為酒乃退若不吉則及遠日有筮日如初宿前宿一日宿戒𡰣明日朝筮𡰣如筮日之禮命曰孝孫某來丁亥用薦歲事于皇祖伯某以其𦘺𦘺某是以某之某為𡰣尚薌筮刲占如初吉則乃遂宿𡰣祝擯主人再拜稽首祝告曰孝孫某來丁亥用薦歲事于皇祖伯某以其𦘺𦘺某是宿𡰣拜許主人有再拜稽首主人退𡰣送揖不拜若不吉則遂改筮𡰣既宿𡰣反為期于廟門之外主人門東南面宗人朝服北面曰請祭期主人曰比於子宗人曰旦明行事主人曰若乃退明日主人朝服即位于廟門外東方南面宰宗人西面北上牲北首東上司馬劸羊司土擊豕宗人告備乃退雍人溉鼎朼柤于雍雍在門東南北上人溉甑朼與敦于在雍之北司官溉豆邊勺爵柧𧣨几洗匪于房東堂下勺爵柧𧣨實于匪卒溉選豆邊與匪于房中枋于西方設洗于作階東南當東榮羹鄭雍人陳鼎三鼎在羊灌之西二鼎在豕灌之西司馬升羊右辨脾不升肩臂臑肫胳正脊一脡脊一衡脊一短脅一正脊一伐脅一皆二骨以𥩵腸三胃三舉肺一祭肺三賓于一鼎司士升豕右辨脾不升肩臂臑肫胳正脊一脡脊一衡脊一短脅一正脊一伐脅一皆二骨以𥩵舉肺一祭肺三實于一鼎雍人論膚九實于一鼎司士有升魚臘魚十有五而鼎臘一肫而鼎臘用麋卒脀皆設扃密乃舉陳鼎于廟門之外東方北面北上司宮尊兩廡于房戶之閒同皆有幕廡有玄酒司宮設雷水于洗東有科匪于洗西南肄改選豆邊于房中南面如餽之設實豆邊實小祝設般釶與匰巾于西階東主人朝服即位于作階東西面司宮延于䧢祝設几于延上右之主人出迎鼎除密士浣舉鼎主人先入司宮取二勺于匪洗之兼以升乃二尊之蓋幕鄭于上加二勺于二尊覆之南柄鼎徐入雍正執一朼以從雍府執四朼以從司士合執二柤以從司士贊者二人皆合執二柤以相從入陳鼎于東方當序南于洗西皆西面北上膚為下朼皆加于鼎東柄柤皆于鼎西西肄甄柤在羊柤之北亦西肄宗人遣賓就主人皆浣于洗長出佐食上私升牢心舌載于甄柤心皆安下刌上午割勿沒載于甄末在上舌皆刌本末亦午割勿沒其載于甄衡之皆初為之于佐食遷甄柤于作階西西摵乃反佐食二人上利升羊右辨脾不升肩臂臑肫胳正脊一脡脊一衡脊一短脅一正脅一伐脅一皆二骨以𥩵腸三胃三長皆及柤椐舉肺一長終肺祭肺三皆刌臂臑肫胳在兩端脊脅肺肩在上下利升豕其載如羊無腸胃𦡊其在于柤皆進下司士三人升魚臘膚魚用鮒十有五而柤摵載右首進腴臘一肫而柤亦進下肩在上膚九而柤亦衡載革順卒脀祝浣于洗升自西階主人浣升自作階祝先入南面主人從戶內西面主婦被錫衣袳袂薦自東房韭菹湛坐鄭于延前婦贊者一人亦被錫衣袳袂執葵菹醢以受主婦主婦不興遂受伓設于東韭菹在南葵菹在北主婦興入于房佐食上利執羊柤下利執豕柤司士三人執魚臘膚柤徐升自西階相從入設柤羊在豆東豕惡其北魚在羊東臘在豕東直膚當柤北端主婦自東房執一金敦黍有蓋坐設于羊柤之南婦贊者執敦稷以授主婦主婦興受坐設于魚柤南有興受贊者敦黍坐設于稷南有興受贊者稷坐設于黍南敦皆南首主婦入于房祝酌鄭遂命佐食會佐食會二以重設于敦南主人西面祝在左主人再拜稽首祝祝曰孝孫某敢用柔毛剛𣎅嘉薦薄淖用薦歲事于皇祖伯某以其𦘺𦘺某是尚薌主人有再拜稽首祝出迎𡰣于廟門之外主人降立于作階東西面祝先入門右𡰣入門左宗人奉般東面于庭南一宗人奉釶水西面于般東一宗人奉匰巾南面于般北乃沃𡰣盥于槃上卒盥坐奠簞取巾興振之三以授𡰣坐取簞興以受𡰣巾祝延𡰣𡰣升自西階入祝從主人升自阼階祝先入主人從𡰣升筵祝主人西面立于戶內祝在左祝主人皆拜妥𡰣𡰣不言𡰣合拜遂坐祝反一南面𡰣取韭菹辨擩于三豆祭于豆閒上佐食取黍稷于四敦下佐食取牢一刌肺于柤以授上佐食上佐食兼與黍以授𡰣𡰣受同祭于豆祭上佐食礜𡰣牢肺正脊以授𡰣佐食璽上敦黍于延上右之主人羞甄升自作階置于膚北上佐食羞兩刑取一羊刑于房中坐設于韭菹之南下佐食有取一豕刑于房中以從上佐食受坐于羊刑之南皆芼皆有柶𡰣扱以柶祭羊刑遂以祭豕刑嘗羊刑食舉三飯上佐食舉𡰣牢乾𡰣受振祭嚌之佐食受加于甄上佐食羞胾兩瓦豆有醬亦用瓦豆設于薦豆之北𡰣有食食胾上佐食舉𡰣一魚𡰣受振祭嚌之佐食受加于甄衡之有食上佐食舉𡰣臘肩𡰣受振祭嚌之受加于甄有食上佐食舉𡰣牢胳如初有食𡰣告飽祝西面于主人南屬侑不拜侑曰皇𡰣未實或𡰣有食上佐食舉𡰣牢肩𡰣受振祭嚌之佐食受加于甄𡰣不飯告飽祝西面于主人之南主人不言拜侑𡰣三飯上佐食受𡰣牢肺脊加于甄主人降洗爵升北面酌酒乃𨡀𡰣𡰣拜受主人拜送𡰣祭酒啐酒賓長羞牢肝用柤摵執柤肝亦摵進末鹽在右𡰣左執爵右兼取肝擩于柤鹽振祭嚌之加于菹豆卒爵主人拜祝受𡰣爵𡰣合拜祝酌授𡰣主人拜受爵𡰣合拜主人西面鄭爵有拜上佐食取四敦黍稷下佐食取牢一刌肺以授上佐食上佐食上佐食以繻祭主人左執爵右受佐食坐祭之有祭酒不興遂啐酒祝與二佐食皆出浣于洗入二佐食各取黍于一敦上佐食兼受摶之以授𡰣𡰣執以命祝卒命祝祝受以東北面于戶西以假于主人曰皇𡰣命工祝承致多福無彊于女孝孫來女孝孫使女受祿于天宜稼于田牛壽萬年勿瑟引之主人坐鄭爵興再拜稽首興受黍坐振祭嚌之詩壞之實于左袂卦于季指執爵以興坐卒爵執以興坐鄭爵拜𡰣合拜執爵以興出宰夫以邊受嗇黍主人嘗之納諸內主人獻祝設席南面祝再于席上坐受主人西面合拜薦兩豆菹醢佐食設俎牢衡脊短脅腸一胃一膚三魚一衡之臘兩脾屬于尻祝取菹擩于醢祭于豆閒祝祭俎祭酒啐酒肝牢從祝受擩于鹽振祭嚌之不興加于俎卒爵興主人酌獻佐食佐食戶內牖東北面拜坐受爵主人西面合拜佐食祭酒卒爵坐授爵興俎設于兩階之閒其俎折一膚主人有獻下佐食亦如之其脀亦設于階閒西上亦折一膚有司贊者取爵于匪以升以授婦贊者于房戶婦贊者受以授主婦主婦洗于房中出酌入戶西面拜獻𡰣𡰣拜受主婦主人之北西面拜送爵𡰣祭酒卒爵主婦拜祝受𡰣爵𡰣合拜易爵洗酌授𡰣主婦拜受爵𡰣合拜上佐食繻祭主婦西面于主人之北受祭祭之其繻祭如主人之禮不假卒爵拜𡰣合拜主婦以爵出贊者受易爵于匪以授主婦于房中主婦洗酌獻祝祝拜坐受主婦合拜于主人之北卒爵不興坐授主婦主婦受酌獻上佐食于戶內佐食北面拜坐受爵主婦西面合拜祭酒卒爵坐授主婦主婦獻下佐食亦如之主婦受爵以入于房賓長洗爵獻于𡰣𡰣拜受爵賓戶西北面拜送爵𡰣祭酒卒爵賓拜祝受𡰣爵𡰣合拜祝酌授𡰣賓拜受爵𡰣拜送爵賓坐鄭爵遂拜執爵以興坐祭遂飲卒爵執爵以興坐鄭爵拜𡰣合拜賓酌獻祝祝拜坐受爵賓北面合拜祝祭酒啐酒鄭爵于其延前主人出立于作階上西面祝出立于西階上東面祝告曰利成祝入𡰣休主人降立于作階東西面祝先𡰣從遂出廟門祝反復位于室中主人亦入于室復位祝命佐食徹甄俎降于堂下作階南司宮設對席乃四饌上佐食浣升下佐食對之賓長二人備司土進一敦黍于上佐食有進一敦黍于下佐食皆右之于席上資黍于羊俎兩端兩下是飯司土乃辨舉者皆祭黍祭舉主人西面三拜者者鄭舉于柤皆合拜皆反取舉司土進下刑于上饌有進一刑于次饌有進二豆汁于兩下乃皆食食舉卒食主人洗一爵升酌以授上饌贊者洗三爵酌主人受于戶內以授次饌若是以辨皆不拜受爵主人西面三拜饌者饌者奠爵皆答拜皆祭酒卒爵奠爵皆拜主人答一拜饌者三人興出上饌止主人受上饌爵酌以酢于戶內西面坐奠爵拜上饌答拜坐祭酒啐酒上饌親嘏曰主人受祭之福胡壽葆建家室主人興坐鄭爵拜執爵以興坐卒爵拜上合拜上興出主人送乃退凡二千九百五十四字
